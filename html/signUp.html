<!DOCTYPE html>
<html lang="ko">

<head>
    <style>
        fieldset {
            border: 1px solid #cbcbcb;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <h1>👤 회원가입</h1>
    <p> SKALA-FRONT 회원가입을 환영합니다.</p>
    <hr>
</head>

<body>

    <form action="signUpResult.html" method="get">
        <fieldset>
            <legend><b>계정 정보</b></legend>
            <p>
                <label for="username">아이디: </label>
                <input type="text" id="username" name="username" placeholder="4-15자 영문/숫자" required> (필수)

            </p>
            <p>
                <label for="password">비밀번호:</label>
                <input type="password" id="password" name="password" placeholder="8자 이상 입력" required> (필수)

            </p>

            <p>
                <label for="email">이메일:</label>
                <input type="text" id="email" name="email" placeholder="example" required> @
                <select name="emailDomain">
                    <option value="direct">직접입력</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="naver.com">naver.com</option>
                    <option value="daum.net">daum.net</option>
                </select>
                <!-- 추후 JS에서 입력창 숨길 수 있게 처리할 예정 -->
                <input type="text" id="emailDomainDirect" name="emailDomainDirect" placeholder="도메인 입력" style="display:none;">
            </p>

        </fieldset>
        <br>

        <fieldset>
            <legend><b>개인 정보</b></legend>
            <p>
                <label for="name">이름:</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required> (필수)
            </p>

            <p>
                <label for="birthdate">생년월일:</label>
                <input type="date" id="birthdate" name="birthdate" required> (필수)
            </p>

            <p>
                <label for="gender">성별:</label>
                <input type="radio" id="male" name="gender" value="male" required> 남성
                <input type="radio" id="female" name="gender" value="female" required> 여성
                <input type="radio" id="prefer_not_to_say" name="gender" value="prefer_not_to_say" required> 선택안함
            </p>
            <p>
                <label for="prefer">관심 분야 (중복 선택 가능):</label> <br>
                <input type="checkbox" id="frontend" name="prefer" value="tech"> 웹 프론트엔드 (Vue.js, React 등) <br>
                <input type="checkbox" id="uiux" name="prefer" value="sports"> UI/UX 디자인 표준 <br>
                <input type="checkbox" id="backend" name="prefer" value="music"> 백엔드 & 데이터베이스 <br>
                <input type="checkbox" id="cloud" name="prefer" value="travel"> 클라우드 & 인프라 <br>
            </p>
            <p>
                <label for="route">가입 경로:</label>
                <select name="route" id="route">
                    <option value="select">--선택해주세요--</option>
                    <option value="search">검색 엔진</option>
                    <option value="social">소셜 미디어</option>
                    <option value="friend">친구 추천</option>
                    <option value="event">행사 참여</option>
                </select>
            </p>

        </fieldset>
        <br>

        <fieldset>
            <legend><b>자기소개</b></legend>
            <p>
                <label for="introduction"><b>나를 표현하는 한 줄 소개 또는 가입인사:</b></label><br>
                <textarea id="introduction" name="introduction" rows="5" cols="50"
                    placeholder="여기에 내용을 입력하세요. (최대 200자)" maxlength="200"></textarea>
            </p>
        </fieldset>
        <br>
        <input type="submit" value="동의하고 회원가입">
        <input type="reset" value="다시 작성">
    </form>

</body>

</html>
